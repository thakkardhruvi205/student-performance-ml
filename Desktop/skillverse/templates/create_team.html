<!DOCTYPE html>
<html>
<head>
    <title>Create Team</title>
</head>
<body>

<h1>Create a Team</h1>

<form method="POST" action="/create-team">
    <label>Team Name:</label><br>
    <input type="text" name="team_name" required><br><br>

    <label>Team Description:</label><br>
    <textarea name="description" rows="4" cols="40" required></textarea><br><br>

    <button type="submit">Create Team</button>
</form>

<br>
<a href="/">Back to Home</a>

</body>
</html>
