<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='skillverse-ui.css') }}">
</head>
<body>

<div class="layout">
<div class="sidebar">
<div class="logo">SkillVerse</div>
<a href="/dashboard">Dashboard</a>
<a href="/profile">Profile</a>
<a href="/leaderboard">Leaderboard</a>
<a href="/logout">Logout</a>
</div>

<div class="main">
<h2>{{ email }}</h2>
<p>Score: {{ score }}</p>

<div class="card">
<form action="/add_skill" method="POST">
<input type="text" name="skill" placeholder="Add Skill" required>
<button>Add</button>
</form>
</div>

<div class="card">
{% for skill in skills %}
<p>{{ skill["skill_name"] }} → <a href="/test/{{ skill['skill_name'] }}">Test</a></p>
{% endfor %}
</div>

</div>
</div>

</body>
</html>
