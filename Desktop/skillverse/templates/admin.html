<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Admin Analytics</h2>
<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById('chart'), {
type: 'bar',
data: {
labels: [{% for user in users %}"{{ user['email'] }}",{% endfor %}],
datasets: [{
label: 'Scores',
data: [{% for user in users %}{{ user['score'] }},{% endfor %}]
}]
}
});
</script>

</body>
</html>
