<!DOCTYPE html>
<html>

<head>

<title>AI Smart Inventory Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
transition:0.4s;
}

.dark{
background:#121212;
color:white;
}

header{
background:#0a2540;
color:white;
padding:20px;
text-align:center;
font-size:26px;
}

.container{
padding:25px;
}

.dashboard{
display:flex;
gap:20px;
margin-bottom:20px;
}

.stat{
flex:1;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.dark .stat{
background:#1f1f1f;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

.dark .card{
background:#1f1f1f;
}

input{
padding:8px;
margin:5px;
}

button{
padding:8px 14px;
background:#0077ff;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#0077ff;
color:white;
padding:8px;
}

td{
padding:8px;
border-bottom:1px solid #ddd;
}

#aiAnswer{
margin-top:10px;
background:#eef6ff;
padding:10px;
border-radius:8px;
}

</style>

</head>

<body>

<header>AI Smart Inventory Dashboard</header>

<div class="container">

<button onclick="toggleTheme()">Toggle Theme</button>

<div class="dashboard">

<div class="stat">
<h2 id="revenue">₹0</h2>
<p>Total Revenue</p>
</div>

<div class="stat">
<h2 id="orders">0</h2>
<p>Total Orders</p>
</div>

<div class="stat">
<h2 id="sold">0</h2>
<p>Products Sold</p>
</div>

<div class="stat">
<h2 id="top">-</h2>
<p>Top Product</p>
</div>

</div>

<div class="card">

<h3>Add Transaction</h3>

<input id="customer" placeholder="Customer Name">
<input id="name" placeholder="Product Name">
<input id="sku" placeholder="SKU">
<input id="category" placeholder="Category">
<input id="quantity" placeholder="Quantity">
<input id="price" placeholder="Price">
<input id="date" type="date">

<button onclick="addProduct()">Add</button>
<button onclick="startVoice()">🎤 Voice</button>

<p>Total ₹ <span id="total">0</span></p>

</div>

<div class="card">

<h3>Inventory</h3>

<button onclick="loadProducts()">Refresh</button>

<table>

<thead>
<tr>
<th>Customer</th>
<th>Product</th>
<th>Qty</th>
<th>Price</th>
<th>Total</th>
<th>Date</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

</div>

<div class="card">

<h3>Sales Analytics</h3>

<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>Barcode Scanner</h3>

<div id="reader" style="width:300px"></div>

</div>

<div class="card">

<h3>🤖 AI Assistant</h3>

<input id="question" placeholder="Ask about system">

<button onclick="askAI()">Ask AI</button>

<div id="aiAnswer"></div>

</div>

</div>

<script>

let chart

quantity.oninput=price.oninput=function(){

let q=Number(quantity.value||0)
let p=Number(price.value||0)

total.innerText=q*p

}

function toggleTheme(){
document.body.classList.toggle("dark")
}

function addProduct(){

let q=Number(quantity.value)
let p=Number(price.value)

const product={

customer:customer.value,
name:name.value,
sku:sku.value,
category:category.value,
quantity:q,
price:p,
total:q*p,
date:date.value

}

fetch("http://localhost:5000/products",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(product)

})
.then(res=>res.json())
.then(()=>{
alert("Saved")
loadProducts()
})

}

function loadProducts(){

fetch("http://localhost:5000/products")

.then(res=>res.json())

.then(data=>{

let table=document.getElementById("table")
table.innerHTML=""

let labels=[]
let values=[]

let revenue=0
let sold=0
let orders=data.length

let productCount={}

data.forEach(p=>{

labels.push(p.name)
values.push(p.quantity)

revenue += Number(p.total||0)
sold += Number(p.quantity||0)

productCount[p.name]=(productCount[p.name]||0)+p.quantity

table.innerHTML+=`
<tr>
<td>${p.customer||"-"}</td>
<td>${p.name}</td>
<td>${p.quantity}</td>
<td>${p.price}</td>
<td>${p.total}</td>
<td>${p.date}</td>
</tr>
`

})

document.getElementById("revenue").innerText="₹"+revenue
document.getElementById("orders").innerText=orders
document.getElementById("sold").innerText=sold

let max=0
let top="-"

for(let p in productCount){
if(productCount[p]>max){
max=productCount[p]
top=p
}
}

document.getElementById("top").innerText=top

updateChart(labels,values)

})

}

function updateChart(labels,values){

if(chart) chart.destroy()

chart=new Chart(
document.getElementById("chart"),
{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Quantity Sold",
data:values,
backgroundColor:"#0077ff"
}]
}
})

}

function startVoice(){

const recognition=new webkitSpeechRecognition()

recognition.onresult=function(e){

let speech=e.results[0][0].transcript

alert("Voice detected: "+speech)

}

recognition.start()

}

function onScanSuccess(decodedText){

let msg=new SpeechSynthesisUtterance("Thank you")

speechSynthesis.speak(msg)

}

let scanner=new Html5QrcodeScanner(
"reader",
{fps:10,qrbox:250}
)

scanner.render(onScanSuccess)

function askAI(){

let q=document.getElementById("question").value.toLowerCase()

let ans=""

if(q.includes("add")){
ans="Enter customer name, product details, quantity and click Add."
}
else if(q.includes("barcode")){
ans="Use barcode scanner to scan SKU of product."
}
else if(q.includes("revenue")){
ans="Revenue card shows total money earned from sales."
}
else if(q.includes("voice")){
ans="Click voice button and speak product details."
}
else{
ans="This AI assistant helps you use the inventory system."
}

document.getElementById("aiAnswer").innerText=ans

}

loadProducts()

</script>

</body>

</html>
